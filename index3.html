<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warden's MC - Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Dark Mode (Default) - Deep Dark Biome Theme */
      --bg: #020101;
      --bg-secondary: #0a0a0a;
      --fg: #e4e4e7;
      --muted: #71717a;
      --accent: #00ff9d; /* Sculk Sensor Green */
      --accent-secondary: #00d4ff; /* Wardent Heart Blue */
      --card: rgba(10, 10, 15, 0.7);
      --border: rgba(255, 255, 255, 0.06);
      --glow: rgba(0, 255, 157, 0.15);
      --card-hover-bg: rgba(0, 255, 157, 0.03);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
      min-height: 100vh;
      cursor: none;
      transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
    }

    /* ===== THEME SWITCHER STYLES ===== */
    
    /* Light Mode Variables */
    body.light-mode {
      --bg: #f8f9fa;
      --bg-secondary: #ffffff;
      --fg: #0f172a;
      --muted: #64748b;
      --accent: #00996b; /* Darker green for contrast */
      --accent-secondary: #0891b2;
      --card: rgba(255, 255, 255, 0.9);
      --border: rgba(0, 0, 0, 0.08);
      --glow: rgba(0, 153, 107, 0.1);
      --card-hover-bg: rgba(0, 0, 0, 0.02);
    }

    /* Theme Switcher Button */
    .theme-switcher {
      width: 52px;
      height: 28px;
      background: var(--border);
      border-radius: 50px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s ease;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .theme-switcher::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), background 0.3s ease;
      z-index: 2;
    }

    body.light-mode .theme-switcher::before {
      transform: translateX(24px);
      background: var(--accent-secondary);
    }

    .switch-icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      transition: opacity 0.3s ease;
    }

    .moon-icon { left: 7px; opacity: 1; }
    .sun-icon { right: 7px; opacity: 0.3; }

    body.light-mode .moon-icon { opacity: 0.3; }
    body.light-mode .sun-icon { opacity: 1; }

    /* Custom Cursor */
    .cursor-core, .cursor-outline {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      border-radius: 50%;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease-out, background 0.3s, border-color 0.3s;
    }

    .cursor-core {
      width: 8px;
      height: 8px;
      background: var(--accent);
      mix-blend-mode: difference;
    }

    .cursor-outline {
      width: 40px;
      height: 40px;
      border: 1px solid var(--accent);
      transition: transform 0.15s ease-out, width 0.3s, height 0.3s, border-color 0.3s, opacity 0.3s;
    }

    /* Canvas Background */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      transition: opacity 0.5s ease;
    }

    /* Typography */
    .font-display {
      font-family: 'Rajdhani', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Navigation */
    .nav-item {
      position: relative;
      color: var(--muted);
      transition: color 0.3s ease;
      padding: 0.5rem 0;
    }

    .nav-item::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      transition: width 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .nav-item:hover, .nav-item.active {
      color: var(--fg);
    }

    .nav-item:hover::after, .nav-item.active::after {
      width: 100%;
    }

    /* Cards */
    .item-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.1s ease, box-shadow 0.3s ease, background 0.4s ease;
      will-change: transform;
      position: relative;
      backdrop-filter: blur(12px);
    }

    .item-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--glow), transparent 40%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1;
    }

    .item-card:hover::before {
      opacity: 1;
    }
    
    .item-card:hover {
       box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
       border-color: var(--accent);
    }

    /* Shine effect */
    .card-shine {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, 0.03) 45%, rgba(255, 255, 255, 0.05) 50%, transparent 54%);
      pointer-events: none;
      transform: translateX(-100%);
      z-index: 2;
    }

    .item-card:hover .card-shine {
      animation: shine 0.6s;
    }

    @keyframes shine {
      to { transform: translateX(100%); }
    }

    /* Button */
    .btn-magnetic {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
      color: #000; /* Text stays black for contrast on gradient */
      font-weight: 700;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      border: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 15px var(--glow);
    }

    .btn-magnetic span {
      position: relative;
      z-index: 1;
    }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }

    .floating-icon {
      animation: float 4s ease-in-out infinite;
    }

    .tab-content {
      display: none;
      opacity: 0;
      transform: translateY(20px);
    }

    .tab-content.active {
      display: block;
      animation: contentFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes contentFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      body { cursor: auto; }
      .cursor-core, .cursor-outline { display: none; }
    }
  </style>
</head>

  <script>
    // ================= DATA =================
    const storeData = {
      featured: [
        { id: 1, name: 'Sculk Pass', price: 29.99, currency: 'USD', tag: 'HOT', desc: 'Unlock all perks for 30 days.', gradient: ['#06b6d4', '#000'] },
        { id: 2, name: 'Warden Wings', price: 14.99, currency: 'USD', tag: 'NEW', desc: 'Animated back accessory.', gradient: ['#00ff9d', '#000'] },
        { id: 3, name: 'VIP Rank', price: 12.99, currency: 'USD', tag: 'POPULAR', desc: 'Permanent rank & chat colors.', gradient: ['#eab308', '#000'] },
        { id: 4, name: 'Coin Pack', price: 9.99, currency: 'USD', tag: 'VALUE', desc: '10,000 coins + bonus.', gradient: ['#00d4ff', '#000'] },
        { id: 5, name: 'Echo Pet', price: 6.99, currency: 'USD', tag: 'RARE', desc: 'A mini warden companion.', gradient: ['#a855f7', '#000'] },
      ],
      ranks: [
        { id: 101, name: 'Explorer', price: 5.99, currency: 'USD', desc: 'Basic perks', color: '#06b6d4' },
        { id: 102, name: 'Guardian', price: 14.99, currency: 'USD', desc: 'Advanced kits', color: '#00ff9d' },
        { id: 103, name: 'Warden', price: 29.99, currency: 'USD', desc: 'Elite commands', color: '#a855f7' },
        { id: 104, name: 'Ancient', price: 59.99, currency: 'USD', desc: 'Ultimate status', color: '#f59e0b' },
      ],
      coins: [

        { id: 202, name: 'Medium Bag', price: 9.99, amount: '12,000', desc: '+2,000 Bonus' },
        { id: 203, name: 'Large Chest', price: 19.99, amount: '25,000', desc: '+6,000 Bonus' },
        { id: 204, name: 'Treasure Vault', price: 39.99, amount: '55,000', desc: '+15,000 Bonus' },
      ],
      cosmetics: [
        { id: 301, name: 'Sculk Cloak', price: 7.99, type: 'Cape' },
        { id: 302, name: 'Sensor Trail', price: 5.99, type: 'Particle' },
        { id: 303, name: 'Mini Warden', price: 12.99, type: 'Companion' },
        { id: 304, name: 'Deep Dark Halo', price: 8.99, type: 'Hat' },
      ]
    };

    const icons = {
      coin: `<svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v12m-3-9h6m-6 6h6"/></svg>`,
      rank: `<svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>`,
      cosmetic: `<svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>`,
      featured: `<svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>`
    };

    // ================= LOGIC =================
    
    // DOM Elements
    const gridContainer = document.getElementById('grid-container');
    const navItems = document.querySelectorAll('.nav-item');
    const heroSection = document.getElementById('hero-section');
    const cursorCore = document.querySelector('.cursor-core');
    const cursorOutline = document.querySelector('.cursor-outline');
    const themeToggle = document.getElementById('theme-toggle');

    // State
    let currentTab = 'featured';
    let mouseX = 0, mouseY = 0;
    let outlineX = 0, outlineY = 0;

    // --- Theme Switching ---
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
    });

    // --- Cursor Logic ---
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursorCore.style.left = mouseX + 'px';
      cursorCore.style.top = mouseY + 'px';
    });

    function animateCursor() {
      outlineX += (mouseX - outlineX) * 0.15;
      outlineY += (mouseY - outlineY) * 0.15;
      
      cursorOutline.style.left = outlineX + 'px';
      cursorOutline.style.top = outlineY + 'px';
      
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // --- Particle Background Logic ---
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.5 + 0.1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        // Mouse interaction
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) {
            const force = (150 - dist) / 150;
            this.x -= dx * force * 0.02;
            this.y -= dy * force * 0.02;
        }

        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
          this.reset();
        }
      }
      draw() {
        // Determine color based on theme
        const isLight = document.body.classList.contains('light-mode');
        const color = isLight ? `rgba(0, 100, 120, ${this.opacity})` : `rgba(0, 255, 157, ${this.opacity})`;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      const numParticles = Math.floor((canvas.width * canvas.height) / 9000);
      for (let i = 0; i < numParticles; i++) {
        particles.push(new Particle());
      }
    }
    initParticles();
    window.addEventListener('resize', initParticles);

    function connectParticles() {
      const isLight = document.body.classList.contains('light-mode');
      for (let i = 0; i < particles.length; i++) {
        for (let j = i; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 100) {
            const opacity = 0.05 * (1 - distance / 100);
            const color = isLight ? `rgba(0, 100, 120, ${opacity})` : `rgba(0, 255, 157, ${opacity})`;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      connectParticles();
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // --- UI Logic ---

    function switchTab(tabName) {
      currentTab = tabName;
      
      navItems.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });

      renderGrid(tabName);
    }

    navItems.forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    function renderGrid(tab) {
      gridContainer.innerHTML = '';
      heroSection.style.display = tab === 'featured' ? 'block' : 'none';

      const data = storeData[tab];
      if (!data) return;

      const grid = document.createElement('div');
      grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6';
      
      data.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'item-card hover-target group';
        card.dataset.id = item.id;
        
        const delay = Math.random() * 2;
        
        let icon = icons.featured;
        if (tab === 'ranks') icon = icons.rank;
        if (tab === 'coins') icon = icons.coin;
        if (tab === 'cosmetics') icon = icons.cosmetic;

        const colorStyle = item.color ? `color: ${item.color}` : 'color: var(--accent)';
        const bgGradient = item.gradient 
          ? `background: linear-gradient(135deg, ${item.gradient[0]}, ${item.gradient[1]})` 
          : `background: var(--card-hover-bg); border: 1px solid var(--border)`;

        card.innerHTML = `
          <div class="card-shine"></div>
          <div class="p-6 flex flex-col h-full relative z-10">
            <div class="flex justify-between items-start mb-6">
              <div class="w-14 h-14 rounded-lg flex items-center justify-center floating-icon" style="${bgGradient}; animation-delay: ${delay}s">
                <span style="${colorStyle}">${icon}</span>
              </div>
              ${item.tag ? `<span class="text-[10px] font-bold px-2 py-1 rounded text-white/80" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);">${item.tag}</span>` : ''}
            </div>
            
            <h3 class="font-display text-xl font-bold mb-2">${item.name}</h3>
            <p class="text-sm mb-6 flex-grow" style="color: var(--muted);">${item.desc || item.type || ''}</p>
            
            <div class="flex items-center justify-between mt-auto pt-4" style="border-top: 1px solid var(--border);">
               <div class="flex flex-col">
                 <span class="text-xs uppercase tracking-wider" style="color: var(--muted);">Price</span>
                 <span class="text-xl font-bold" style="color: var(--fg);">${item.price.toFixed(2)} ${item.currency}</span>
               </div>
               <button class="btn-magnetic magnetic-area">
                 <span>Buy Now</span>
               </button>
            </div>
          </div>
        `;

        // 3D Tilt Effect
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          
          const rotateX = (y - centerY) / 10;
          const rotateY = (centerX - x) / 10;
          
          card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
          
          card.style.setProperty('--mouse-x', `${x}px`);
          card.style.setProperty('--mouse-y', `${y}px`);
        });

        card.addEventListener('mouseleave', () => {
          card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
        });

        // Magnetic Button Logic
        const btn = card.querySelector('.btn-magnetic');
        btn.addEventListener('mousemove', (e) => {
           const rect = btn.getBoundingClientRect();
           const x = e.clientX - rect.left - rect.width / 2;
           const y = e.client - rect.top - rect.height / 2;
           btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
        });
        btn.addEventListener('mouseleave', () => {
           btn.style.transform = 'translate(0px, 0px)';
        });

        grid.appendChild(card);
      });

      gridContainer.appendChild(grid);
    }

    // Init
    renderGrid('featured');

  </script>
</body>
</html>
